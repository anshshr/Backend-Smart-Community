name: Testing workflow CI/CD pipeline

on:
  push : 
    branches: [main , dev , master]
  pull_request : 
    branches: [main , dev , master]


jobs:
  build-and-Test:
    runs-on:  ubuntu-latest
    steps:
      
      - name : Clone the code
        uses: actions/checkout@v2

      - name: Set up the node js enviroment
        uses: actions/setup-node@v6
        with:
           node-version: '20'

      - name: Install the dependencies
        run: npm install

      - name: build the project
        run: npm run build

      - name: Build the docker file
        run: docker build -t anshshr/smart-community  .

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}


      - name  : Push it to docker hub
        run: docker push anshshr/smart-community
        

  